# --- CTDS+ with attention-based teacher (QMIX + KD unchanged) ---

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 100000

runner: "parallel"
batch_size_run: 8
buffer_size: 5000
batch_size: 128
optimizer: 'adam'

t_max: 10050000
target_update_interval: 200

mac: "teacher_attn_mac"
agent: "teacher_attn"
student_agent: "n_rnn"
agent_output_type: q
learner: "nq_learner"
mixer: "qmix"
mixing_embed_dim: 32
hypernet_embed: 64
lr: 0.001
td_lambda: 0.6
q_lambda: False

use_layer_norm: False
use_orthogonal: False
gain: 0.01
use_rnn: True

obs_agent_id: True
obs_last_action: True

paradigm: "CTDS"
teacher_only: False
num_circle: 1

# TeacherAttnAgent hyperparameters
attn_dim: 64
attn_heads: 4
use_distance_bias: True
distance_bias_scale: 1.0

name: "ctds_plus_qmix_env=8_adam_td_lambda"
